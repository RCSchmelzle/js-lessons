<!DOCTYPE html>

<head>

<title>Lesson 2 — Working with Data</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css" />
</head>
<body>
<div></div>
<script>
window.LESSON_INFO = { num: "Lesson 2", name: "Working with Data", prev: "01-foundations.html", next: "03-dom.html" };
window.SLIDES = [
  {
    title: "[MUST KNOW] .forEach() — cleaner looping",
    concept: "<strong>Mental model:</strong> 'For each item in this array, do something.'<br><br><span class='cr'>.forEach()</span> runs a function once per array item. The arrow function (<span class='cr'>=></span>) is modern JS shorthand — you'll see it everywhere. Both styles do the same thing.",
    code: "let users = [\n  { name: \"Alice\", age: 23 },\n  { name: \"Bob\", age: 17 }\n];\n\nusers.forEach(user => {\n  console.log(user.name + \" — \" + user.age);\n});",
    lines: [
      ["users.forEach(...)", "call forEach on the array"],
      ["user => { ... }", "arrow function: 'user' is each item in turn"],
      ["user.name + \" — \" + user.age", "access both properties from the current item"]
    ],
    expected: ["Alice — 23", "Bob — 17"],
    tryit: "Add a third user. Print each user's name in uppercase using <strong>.toUpperCase()</strong>."
  },
  {
    title: "[MUST KNOW] .map() — transform into a new array",
    concept: "<strong>Mental model:</strong> Take each item, apply a function, return a new array.<br><br><span class='cr'>.map()</span> creates a <strong>new array</strong> by running a function on each item and collecting the results. The original array is never changed.<br><br>This is one of the most common interview topics.<div style=\"margin-top:8px;padding:6px 10px;background:rgba(248,113,113,0.08);border-left:3px solid var(--color-red);border-radius:4px;font-size:12px\"><strong>Common mistake:</strong> Forgetting to return inside map — using curly braces without return gives undefined for every item.</div>",
    code: "let users = [\n  { name: \"Alice\", age: 23 },\n  { name: \"Bob\", age: 17 },\n  { name: \"Carl\", age: 30 }\n];\n\nlet names = users.map(user => user.name);\nlet ages  = users.map(user => user.age);\nlet upper = users.map(user => user.name.toUpperCase());\n\nconsole.log(names);\nconsole.log(ages);\nconsole.log(upper);",
    lines: [
      ["users.map(user => user.name)", "for each user, return just the name"],
      ["users.map(user => user.age)", "for each user, return just the age"],
      ["user.name.toUpperCase()", "string method: converts text to ALL CAPS"]
    ],
    expected: ["[\"Alice\",\"Bob\",\"Carl\"]", "[23,17,30]", "[\"ALICE\",\"BOB\",\"CARL\"]"],
    tryit: "Map the users to an array of strings like <strong>\"Alice is 23\"</strong>."
  },
  {
    title: "[MUST KNOW] .filter() — select matching items",
    concept: "<span class='cr'>.filter()</span> returns a new array containing only the items where the function returns <span class='cr'>true</span>. Items returning <span class='cr'>false</span> are left out.<br><br><strong>Mental model:</strong> Keep items where the condition is true, discard the rest.<div style=\"margin-top:8px;padding:6px 10px;background:rgba(248,113,113,0.08);border-left:3px solid var(--color-red);border-radius:4px;font-size:12px\"><strong>Common mistake:</strong> Confusing filter with find — filter returns an array, find returns one item.</div>",
    code: "let users = [\n  { name: \"Alice\", age: 23 },\n  { name: \"Bob\", age: 17 },\n  { name: \"Carl\", age: 30 }\n];\n\nlet adults = users.filter(user => user.age >= 18);\nlet minors = users.filter(user => user.age < 18);\n\nconsole.log(\"Adults:\", adults.length);\nconsole.log(\"Minors:\", minors.length);\nconsole.log(adults.map(u => u.name));",
    lines: [
      ["user.age >= 18", "condition: only keep users 18 or older"],
      ["user.age < 18", "condition: only keep users under 18"],
      ["adults.length", "how many items passed the filter"],
      ["adults.map(u => u.name)", "chain map onto the filtered result"]
    ],
    expected: ["Adults: 2", "Minors: 1", "[\"Alice\",\"Carl\"]"],
    tryit: "Filter users whose name starts with \"A\" using <strong>user.name.startsWith(\"A\")</strong>."
  },
  {
    title: "[MUST KNOW] .find() — get one matching item",
    concept: "<span class='cr'>.find()</span> returns the <strong>first item</strong> that matches — a single object, not an array. Returns <span class='cr'>undefined</span> if nothing matches.<br><br>Returns the first match, not all matches. Returns undefined if nothing matches.",
    code: "let users = [\n  { name: \"Alice\", age: 23 },\n  { name: \"Bob\", age: 17 },\n  { name: \"Carl\", age: 30 }\n];\n\nlet alice = users.find(u => u.name === \"Alice\");\nlet oldest = users.find(u => u.age === 30);\nlet nobody = users.find(u => u.name === \"Zara\");\n\nconsole.log(alice);\nconsole.log(oldest.name);\nconsole.log(nobody);",
    lines: [
      ["users.find(u => u.name === \"Alice\")", "return the first user named Alice"],
      ["=== (triple equals)", "strict equality — checks value AND type"],
      ["users.find(u => u.age === 30)", "find by age — returns Carl's object"],
      ["nobody", "no match found — returns undefined"]
    ],
    expected: ["{name:\"Alice\",age:23}", "Carl", "undefined"],
    tryit: "Find the user whose age is 17. Then try finding a name that doesn't exist and observe the result."
  },
  {
    title: "[GOOD TO KNOW] Destructuring — pull values out cleanly",
    concept: "Destructuring lets you extract object properties into named variables in one line. You'll see this pattern in nearly every modern JS file.",
    code: "let user = { name: \"Alice\", age: 23, city: \"Raleigh\" };\n\n// old way:\nlet n1 = user.name;\n\n// destructuring:\nlet { name, age, city } = user;\n\nconsole.log(name);\nconsole.log(age);\nconsole.log(city);\n\n// also works in function params:\nfunction greet({ name, age }) {\n  return name + \" is \" + age;\n}\nconsole.log(greet(user));",
    lines: [
      ["let { name, age, city } = user", "extract 3 properties into 3 variables at once"],
      ["name", "now a standalone variable, value: \"Alice\""],
      ["function greet({ name, age })", "destructure directly in the parameter list"]
    ],
    expected: ["Alice", "23", "Raleigh", "Alice is 23"],
    tryit: "Destructure <strong>name</strong> and <strong>age</strong> from a user inside a <span class='cr'>.forEach()</span> loop and print them."
  },
  {
    title: "[GOOD TO KNOW] Spread operator — copy & update",
    concept: "The spread operator (<span class='cr'>...</span>) expands an array or object in place. Use it to copy data without modifying the original — a core principle in modern JS.",
    code: "let nums = [1, 2, 3];\nlet more = [...nums, 4, 5];\nconsole.log(nums);\nconsole.log(more);\n\nlet user = { name: \"Alice\", age: 23 };\nlet updated = { ...user, age: 24, city: \"Durham\" };\nconsole.log(user.age);\nconsole.log(updated);",
    lines: [
      ["[...nums, 4, 5]", "copy all items from nums, then add 4 and 5"],
      ["console.log(nums)", "original is unchanged"],
      ["{ ...user, age: 24 }", "copy all user properties, override age with 24"],
      ["user.age", "still 23 — spread never modifies the original"]
    ],
    expected: ["[1,2,3]", "[1,2,3,4,5]", "23", "{name:\"Alice\",age:24,city:\"Durham\"}"],
    tryit: "Create a user object. Use spread to create a copy with a different city, then print both."
  },
  {
    title: "[MUST KNOW] Chaining .filter() and .map()",
    concept: "Array methods return new arrays, so you can chain them directly. This is the most common real-world data pattern: filter to what you want, then transform it.<br><br>This is the most common real-world data pattern and shows up constantly in interviews.<br><br><strong>Interview tip:</strong> If asked 'how would you get names of all adults?', answer: filter to adults, then map to names.",
    code: "let users = [\n  { name: \"Alice\", age: 23 },\n  { name: \"Bob\", age: 17 },\n  { name: \"Carl\", age: 30 }\n];\n\nlet adultNames = users\n  .filter(u => u.age >= 18)\n  .map(u => u.name);\n\nconsole.log(adultNames);\n\nlet minorInfo = users\n  .filter(u => u.age < 18)\n  .map(u => u.name + \" (\" + u.age + \")\");\n\nconsole.log(minorInfo);",
    lines: [
      [".filter(u => u.age >= 18)", "step 1: keep adults only"],
      [".map(u => u.name)", "step 2: transform — extract just names"],
      [".filter(u => u.age < 18)", "new chain: keep minors only"],
      ["u.name + \" (\" + u.age + \")\"", "build a formatted string per item"]
    ],
    expected: ["[\"Alice\",\"Carl\"]", "[\"Bob (17)\"]"],
    tryit: "Chain filter + map to get names of users whose name has more than 3 characters."
  },
  {
    title: "Final practice — products",
    concept: "A complete real-world data exercise: filter, transform, find, spread, chain. Run it step by step and confirm each output matches what you expect.<br><br>This exercise uses every array method. If you can do this, you understand the core data manipulation patterns.",
    code: "let products = [\n  { name: \"Laptop\", price: 1000 },\n  { name: \"Phone\",  price: 500 },\n  { name: \"Tablet\", price: 300 }\n];\n\nlet names      = products.map(p => p.name);\nlet affordable = products.filter(p => p.price < 600);\nlet laptop     = products.find(p => p.name === \"Laptop\");\nlet discounted = affordable.map(p => ({ ...p, price: +(p.price * 0.9).toFixed(2) }));\n\nconsole.log(names);\nconsole.log(affordable.map(p => p.name));\nconsole.log(laptop.price);\nconsole.log(discounted);",
    lines: [
      ["products.map(p => p.name)", "extract all product names"],
      ["products.filter(p => p.price < 600)", "keep only Phone and Tablet"],
      ["products.find(p => p.name === \"Laptop\")", "find the laptop object"],
      ["{ ...p, price: ... }", "copy the product, override price with discounted value"]
    ],
    expected: ["[\"Laptop\",\"Phone\",\"Tablet\"]", "[\"Phone\",\"Tablet\"]", "1000", "[{name:\"Phone\",price:450},{name:\"Tablet\",price:270}]"],
    tryit: "Add a <strong>stock</strong> property to each product. Filter to only in-stock items (stock > 0), then map to names."
  },
  {
    title: "Practice — LeetCode challenges",
    concept: "Array manipulation is the highest-value interview skill. Practice with these problems — try solving each one twice: once with a plain loop, once with map/filter/find.<ul style='margin:8px 0 0 16px;font-size:13px;line-height:2'><li><a href='https://leetcode.com/problems/running-sum-of-1d-array/' target='_blank' style='color:var(--color-accent)'>Running Sum of 1d Array</a> — array traversal + building results</li><li><a href='https://leetcode.com/problems/concatenation-of-array/' target='_blank' style='color:var(--color-accent)'>Concatenation of Array</a> — array transforms (try with spread)</li><li><a href='https://leetcode.com/problems/shuffle-string/' target='_blank' style='color:var(--color-accent)'>Shuffle String</a> — indexing + reconstruction</li><li><a href='https://leetcode.com/problems/two-sum/' target='_blank' style='color:var(--color-accent)'>Two Sum</a> — the classic interview problem</li><li><a href='https://leetcode.com/problems/two-sum-ii-input-array-is-sorted/' target='_blank' style='color:var(--color-accent)'>Two Sum II</a> — good stretch, still manageable</li></ul>",
    code: "// Practice: Two Sum concept\n// Given an array and a target, find two numbers that add up to it\n\nlet nums = [2, 7, 11, 15];\nlet target = 9;\n\n// Brute force approach:\nfor (let i = 0; i < nums.length; i++) {\n  for (let j = i + 1; j < nums.length; j++) {\n    if (nums[i] + nums[j] === target) {\n      console.log(\"Found:\", nums[i], \"+\", nums[j], \"=\", target);\n      console.log(\"Indices:\", i, j);\n    }\n  }\n}\n\n// Try: can you solve Running Sum?\nlet input = [1, 2, 3, 4];\nlet result = [];\nlet sum = 0;\nfor (let n of input) {\n  sum += n;\n  result.push(sum);\n}\nconsole.log(\"Running sum:\", result);",
    lines: [
      ["nested for loops", "check every pair of numbers"],
      ["nums[i] + nums[j] === target", "do they add up to the target?"],
      ["i + 1", "start j after i to avoid checking the same pair twice"],
      ["running sum", "each element is the sum of all elements before it (inclusive)"]
    ],
    expected: ["Found: 2 + 7 = 9", "Indices: 0 1", "Running sum: [1,3,6,10]"],
    tryit: "Try solving these on LeetCode in JavaScript. Start with Running Sum, then Two Sum. For extra practice, solve Running Sum using <strong>.map()</strong> instead of a loop."
  }
];
</script>
<script src="engine.js"></script>
</body>
</html>
