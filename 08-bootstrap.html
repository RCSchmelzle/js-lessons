<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lesson 8 — Bootstrap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>.dom-canvas * { box-sizing: border-box; }</style>
</head>
<body>
<div></div>
<script>
window.LESSON_INFO = { num: "Lesson 8", name: "Bootstrap", prev: "07-scope-closures.html", next: "09-debugging.html" };
window.HAS_CANVAS = true;
window.SLIDES = [
  {
    title: "[OPTIONAL] What is Bootstrap?",
    canvasHTML: '<div style="padding:8px"><p style="margin-bottom:8px;font-size:13px">Plain button vs Bootstrap button:</p><button style="margin-bottom:6px">Plain button</button><br><button class="btn btn-primary">Bootstrap button</button></div>',
    concept: "Bootstrap is a CSS framework -- it handles styling so you can focus on JavaScript. It changes how things look, not how they work.<br><br>Bootstrap is a <strong>CSS framework</strong> -- a collection of pre-made styles you apply with class names. Instead of writing CSS from scratch, you add classes like <span class='cr'>btn btn-primary</span> and get a styled button instantly.",
    code: "// Bootstrap is just CSS classes.\n// You don't write CSS — you add classes to HTML.\n\n// Plain HTML button:\n// <button>Click me</button>\n\n// Bootstrap button:\n// <button class=\"btn btn-primary\">Click me</button>\n\n// The difference is ONLY styling.\n// Your JavaScript stays exactly the same.\n\nlet btn = { className: \"btn btn-primary\" };\nconsole.log(\"Button classes:\", btn.className);\nconsole.log(\"JS doesn't change — only the HTML classes do\");",
    lines: [
      ["btn btn-primary", "Bootstrap classes: btn = base style, btn-primary = blue color"],
      ["CSS framework", "a library of pre-written styles you use via class names"],
      ["JS doesn't change", "Bootstrap is styling only — your logic stays the same"],
      ["class=\"...\"", "you add Bootstrap by putting class names on HTML elements"]
    ],
    expected: ["Button classes: btn btn-primary", "JS doesn't change — only the HTML classes do"],
    tryit: "Look up Bootstrap's button classes. How would you make a red button? A green one? A large one?"
  },
  {
    title: "[OPTIONAL] Adding Bootstrap to your project",
    concept: "Add one line inside <span class='cr'>&lt;head&gt;</span> and you're done. No install, no setup -- it loads from a CDN (content delivery network).",
    code: "// Add this ONE line inside <head> of your HTML:\n//\n// <link href=\"https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css\" rel=\"stylesheet\">\n//\n// That's it. Now all Bootstrap classes work.\n\nlet setup = {\n  method: \"CDN link in <head>\",\n  install: \"none required\",\n  fileChanges: \"only HTML classes\"\n};\n\nconsole.log(\"Setup method:\", setup.method);\nconsole.log(\"Install needed:\", setup.install);\nconsole.log(\"What changes:\", setup.fileChanges);",
    lines: [
      ["CDN", "loads Bootstrap from the internet — no download needed"],
      ["<link> in <head>", "one line gives you access to all Bootstrap classes"],
      ["no install", "unlike Node packages, CDN just works instantly"],
      ["only HTML classes", "you never edit Bootstrap files — just use the classes"]
    ],
    expected: ["Setup method: CDN link in <head>", "Install needed: none required", "What changes: only HTML classes"],
    tryit: "Add the Bootstrap CDN link to your index.html. Then add <span class='cr'>class=\"btn btn-primary\"</span> to a button and see the difference."
  },
  {
    title: "[OPTIONAL] Container and spacing",
    concept: "<span class='cr'>container</span> centers your content with max-width. Spacing classes like <span class='cr'>mt-3</span> (margin-top) and <span class='cr'>p-3</span> (padding) replace manual CSS spacing.",
    code: "// Bootstrap spacing uses a simple system:\n// m = margin, p = padding\n// t = top, b = bottom, x = horizontal, y = vertical\n// 0-5 = size (0 = none, 5 = largest)\n\nlet spacingExamples = {\n  \"mt-3\": \"margin-top: medium\",\n  \"mb-5\": \"margin-bottom: extra large\",\n  \"p-3\":  \"padding: medium (all sides)\",\n  \"px-4\": \"padding left+right: large\",\n  \"my-2\": \"margin top+bottom: small\"\n};\n\nfor (let [cls, meaning] of Object.entries(spacingExamples)) {\n  console.log(cls + \" → \" + meaning);\n}\n\nconsole.log(\"\\nLayout:\");\nconsole.log(\"container → centers content, sets max-width\");\nconsole.log(\"container-fluid → full width\");",
    lines: [
      ["mt-3", "m(argin) t(op) 3(medium) — no CSS needed"],
      ["px-4", "p(adding) x(horizontal) 4(large)"],
      ["container", "wraps your content, centers it, adds max-width"],
      ["0-5 scale", "0 = none, 1 = tiny, 3 = medium, 5 = extra large"]
    ],
    expected: ["mt-3 → margin-top: medium", "mb-5 → margin-bottom: extra large", "p-3 → padding: medium (all sides)", "px-4 → padding left+right: large", "my-2 → margin top+bottom: small", "", "Layout:", "container → centers content, sets max-width", "container-fluid → full width"],
    tryit: "Wrap your app in a <span class='cr'>&lt;div class=\"container mt-5\"&gt;</span>. See how it centers and adds space."
  },
  {
    title: "[OPTIONAL] Buttons, inputs, and lists",
    canvasHTML: '<div style="padding:8px"><div class="mb-2"><button class="btn btn-primary btn-sm me-1">Primary</button><button class="btn btn-success btn-sm me-1">Success</button><button class="btn btn-danger btn-sm me-1">Danger</button><button class="btn btn-warning btn-sm me-1">Warning</button><button class="btn btn-outline-primary btn-sm">Outline</button></div><input class="form-control form-control-sm mb-2" placeholder="form-control input" /><ul class="list-group list-group-sm"><li class="list-group-item py-1" style="font-size:12px">List item 1</li><li class="list-group-item py-1" style="font-size:12px">List item 2</li><li class="list-group-item py-1" style="font-size:12px">List item 3</li></ul></div>',
    concept: "The three components you'll use most: <strong>buttons</strong> (<span class='cr'>btn btn-*</span>), <strong>inputs</strong> (<span class='cr'>form-control</span>), and <strong>lists</strong> (<span class='cr'>list-group</span>). These instantly make your app look professional.",
    code: "// Button variants:\nlet buttons = [\n  \"btn btn-primary   → blue\",\n  \"btn btn-success   → green\",\n  \"btn btn-danger    → red\",\n  \"btn btn-warning   → yellow\",\n  \"btn btn-outline-primary → blue outline\",\n  \"btn btn-sm        → small size\",\n  \"btn btn-lg        → large size\"\n];\n\nconsole.log(\"BUTTONS:\");\nbuttons.forEach(b => console.log(\"  \" + b));\n\nconsole.log(\"\\nINPUTS:\");\nconsole.log(\"  form-control → styled text input\");\nconsole.log(\"  form-control mb-2 → input with margin below\");\n\nconsole.log(\"\\nLISTS:\");\nconsole.log(\"  list-group → the container <ul>\");\nconsole.log(\"  list-group-item → each <li>\");",
    lines: [
      ["btn btn-primary", "base button + blue color variant"],
      ["btn-success / btn-danger", "green and red — useful for add/delete"],
      ["form-control", "makes <input> look clean with proper sizing"],
      ["list-group + list-group-item", "styled list — perfect for to-do items"]
    ],
    expected: ["BUTTONS:", "  btn btn-primary   → blue", "  btn btn-success   → green", "  btn btn-danger    → red", "  btn btn-warning   → yellow", "  btn btn-outline-primary → blue outline", "  btn btn-sm        → small size", "  btn btn-lg        → large size", "", "INPUTS:", "  form-control → styled text input", "  form-control mb-2 → input with margin below", "", "LISTS:", "  list-group → the container <ul>", "  list-group-item → each <li>"],
    tryit: "Update your to-do app: add <span class='cr'>form-control</span> to the input, <span class='cr'>btn btn-success</span> to the add button, and <span class='cr'>list-group</span>/<span class='cr'>list-group-item</span> to the list."
  },
  {
    title: "[OPTIONAL] Grid layout -- rows and columns",
    canvasHTML: '<div style="padding:8px"><div class="row g-2 mb-2"><div class="col-6"><div style="background:rgba(129,140,248,0.2);border:1px solid rgba(129,140,248,0.4);border-radius:4px;padding:6px;text-align:center;font-size:11px">col-6</div></div><div class="col-6"><div style="background:rgba(129,140,248,0.2);border:1px solid rgba(129,140,248,0.4);border-radius:4px;padding:6px;text-align:center;font-size:11px">col-6</div></div></div><div class="row g-2 mb-2"><div class="col-3"><div style="background:rgba(52,211,153,0.2);border:1px solid rgba(52,211,153,0.4);border-radius:4px;padding:6px;text-align:center;font-size:11px">col-3</div></div><div class="col-9"><div style="background:rgba(52,211,153,0.2);border:1px solid rgba(52,211,153,0.4);border-radius:4px;padding:6px;text-align:center;font-size:11px">col-9</div></div></div><div class="row g-2"><div class="col-4"><div style="background:rgba(251,191,36,0.2);border:1px solid rgba(251,191,36,0.4);border-radius:4px;padding:6px;text-align:center;font-size:11px">col-4</div></div><div class="col-4"><div style="background:rgba(251,191,36,0.2);border:1px solid rgba(251,191,36,0.4);border-radius:4px;padding:6px;text-align:center;font-size:11px">col-4</div></div><div class="col-4"><div style="background:rgba(251,191,36,0.2);border:1px solid rgba(251,191,36,0.4);border-radius:4px;padding:6px;text-align:center;font-size:11px">col-4</div></div></div></div>',
    concept: "Bootstrap's grid divides the page into <strong>12 columns</strong>. Use <span class='cr'>row</span> and <span class='cr'>col</span> classes to create layouts. Columns auto-size, or you can specify widths like <span class='cr'>col-6</span> (half).",
    code: "// Grid system: 12 columns total\n\nlet layouts = [\n  {\n    name: \"Equal halves\",\n    cols: \"6 + 6 = 12\"\n  },\n  {\n    name: \"Sidebar + main\",\n    cols: \"3 + 9 = 12\"\n  },\n  {\n    name: \"Three equal\",\n    cols: \"4 + 4 + 4 = 12\"\n  }\n];\n\nlayouts.forEach(l => {\n  console.log(l.name + \" (\" + l.cols + \")\");\n});",
    lines: [
      ["row", "creates a horizontal container for columns"],
      ["col", "auto-sizes to fill available space equally"],
      ["col-3 / col-9", "explicit widths: 3/12 = 25%, 9/12 = 75%"],
      ["always = 12", "column numbers in a row should add up to 12"]
    ],
    expected: ["Equal halves (6 + 6 = 12)", "Sidebar + main (3 + 9 = 12)", "Three equal (4 + 4 + 4 = 12)"],
    tryit: "Create a two-column layout: left side has the input+button, right side has the task list."
  },
  {
    title: "[OPTIONAL] Upgrading your to-do app",
    canvasHTML: '<div style="padding:8px"><h5 class="mb-2">To-Do List</h5><div class="input-group input-group-sm mb-2"><input class="form-control" id="bsInput" placeholder="Enter task..." /><button class="btn btn-success" id="bsAdd">Add</button></div><ul class="list-group" id="bsList"><li class="list-group-item py-1 d-flex justify-content-between align-items-center" style="font-size:12px">Example task <button class="btn btn-outline-danger btn-sm" style="font-size:10px;padding:1px 6px">X</button></li></ul></div>',
    concept: "Here's the before/after. Same JavaScript, just Bootstrap classes added to the HTML. This is the key insight: <strong>Bootstrap changes appearance, not behavior</strong>.<br><br><strong>Key insight:</strong> Same JavaScript, just Bootstrap classes added to the HTML. Bootstrap changes appearance, not behavior.",
    code: "// BEFORE (plain HTML):\nlet before = [\n  '<input id=\"taskInput\" />',\n  '<button id=\"addBtn\">Add</button>',\n  '<ul id=\"list\"></ul>'\n];\n\n// AFTER (with Bootstrap):\nlet after = [\n  '<div class=\"container mt-5\" style=\"max-width:500px\">',\n  '  <h2 class=\"mb-3\">To-Do List</h2>',\n  '  <div class=\"input-group mb-3\">',\n  '    <input class=\"form-control\" id=\"taskInput\" placeholder=\"Enter task...\">',\n  '    <button class=\"btn btn-success\" id=\"addBtn\">Add</button>',\n  '  </div>',\n  '  <ul class=\"list-group\" id=\"list\"></ul>',\n  '</div>'\n];\n\nconsole.log(\"BEFORE:\");\nbefore.forEach(l => console.log(\"  \" + l));\nconsole.log(\"\\nAFTER:\");\nafter.forEach(l => console.log(\"  \" + l));\n\nconsole.log(\"\\nJS code: UNCHANGED\");",
    lines: [
      ["container mt-5", "centers app, adds top margin"],
      ["input-group", "groups input and button on one line"],
      ["form-control", "styled input field"],
      ["btn btn-success", "green add button"],
      ["list-group", "styled list container"],
      ["JS: UNCHANGED", "same querySelector, addEventListener, etc."]
    ],
    expected: ["BEFORE:", "  <input id=\"taskInput\" />", "  <button id=\"addBtn\">Add</button>", "  <ul id=\"list\"></ul>", "", "AFTER:", "  <div class=\"container mt-5\" style=\"max-width:500px\">", "  <h2 class=\"mb-3\">To-Do List</h2>", "  <div class=\"input-group mb-3\">", "  <input class=\"form-control\" id=\"taskInput\" placeholder=\"Enter task...\">", "  <button class=\"btn btn-success\" id=\"addBtn\">Add</button>", "  </div>", "  <ul class=\"list-group\" id=\"list\"></ul>", "  </div>", "", "JS code: UNCHANGED"],
    tryit: "Apply the Bootstrap upgrade to your actual to-do app. The JS stays the same — only change the HTML classes."
  },
  {
    title: "[OPTIONAL] Rules for using Bootstrap",
    concept: "Bootstrap is a <strong>styling shortcut</strong>, not a skill to master. Use it to save time after your JS works. Don't go down styling rabbit holes -- keep focus on JavaScript.",
    code: "// DO:\nlet goodHabits = [\n  \"Use it AFTER your JS logic works\",\n  \"Use a few key classes only\",\n  \"Use it to save time, not impress\",\n  \"Keep focus on JavaScript behavior\"\n];\n\n// DON'T:\nlet badHabits = [\n  \"Try to learn every Bootstrap class\",\n  \"Debug styling before fixing JS\",\n  \"Spend hours on pixel-perfect layout\",\n  \"Rely on it to understand CSS\"\n];\n\nconsole.log(\"DO:\");\ngoodHabits.forEach((h, i) => console.log(\"  \" + (i+1) + \". \" + h));\n\nconsole.log(\"\\nDON'T:\");\nbadHabits.forEach((h, i) => console.log(\"  \" + (i+1) + \". \" + h));\n\nconsole.log(\"\\nBootstrap = styling shortcut\");\nconsole.log(\"JavaScript = behavior (the real skill)\");",
    lines: [
      ["AFTER JS works", "get logic right first, then make it pretty"],
      ["few key classes", "container, btn, form-control, list-group, mt/mb/p"],
      ["don't learn every class", "you'll look things up as needed — that's normal"],
      ["styling shortcut", "Bootstrap saves time, but JS is the real skill"]
    ],
    expected: ["DO:", "  1. Use it AFTER your JS logic works", "  2. Use a few key classes only", "  3. Use it to save time, not impress", "  4. Keep focus on JavaScript behavior", "", "DON'T:", "  1. Try to learn every Bootstrap class", "  2. Debug styling before fixing JS", "  3. Spend hours on pixel-perfect layout", "  4. Rely on it to understand CSS", "", "Bootstrap = styling shortcut", "JavaScript = behavior (the real skill)"],
    tryit: "Take 30 minutes max to Bootstrap-ify your final project. Then stop and move on."
  }
];
</script>
<script src="engine.js"></script>
</body>
</html>
